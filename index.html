<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Emergencia</title>
</head>
<body style="font-family: Arial; text-align:center; padding:40px;">

  <h2>🚨 Niño encontrado</h2>
  <p>Presiona el botón para enviar ubicación</p>

  <button onclick="enviarUbicacion()" style="padding:15px; font-size:16px;">
    Enviar ubicación
  </button>

  <script>
    function enviarUbicacion() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
          let lat = position.coords.latitude;
          let lng = position.coords.longitude;

          let numero = "51999999999"; // 👈 CAMBIA ESTE NÚMERO
          let mensaje = `Hola, encontré a tu hijo. Ubicación: https://maps.google.com/?q=${lat},${lng}`;
          let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

          window.location.href = url;
        });
      } else {
        alert("Tu celular no soporta ubicación");
      }
    }
  </script>

</body>
</html>
